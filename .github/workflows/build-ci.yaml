name: "Testing build on commit"

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      - name: Lint & format check (biome)
        run: npm run check

      - name: Unit & frontend tests
        run: npm run test:unit

      - name: Real local-socket tests
        run: npm run test:server

      # Build the frontend so the StaticServer HTTP test runs (the GAMA tests in
      # the integration project auto-skip here since no GAMA server is present).
      - name: Build frontend
        run: npm run build:frontend

      - name: Integration tests (StaticServer; GAMA-gated ones skip)
        run: npm run test:integration

  # Real-GAMA integration tests. Boots a headless GAMA server, then runs the
  # `integration` project (which auto-skips when no server is reachable).
  #
  # This job only runs once the repository variable GAMA_DOWNLOAD_URL is set to
  # a GAMA headless build for Linux — until then it is a no-op, so it never
  # blocks CI. Confirm the correct download URL and server-launch command for
  # the GAMA version the team targets, then set that variable.
  test-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Disable pre-release as the plugin isn't compatible yet
        #gama-version: ['latest', 'pre-release']
        gama-version: ['latest']
    env:
      GAMA_IP_ADDRESS: localhost
      GAMA_WS_PORT: "2000"
    steps:
      - name: Resolve GAMA download link
        run: |
          if [ "${{ matrix.gama-version }}" = "latest" ]; then
            GAMA_DOWNLOAD_URL=$(curl -s https://api.github.com/repos/gama-platform/gama/releases/latest | jq -r '.assets[] | select(.name | contains("Linux_with_JDK") and endswith(".zip")) | .browser_download_url')
          else
            GAMA_DOWNLOAD_URL=$(curl -s https://api.github.com/repos/gama-platform/gama/releases | jq -r '[.[] | select(.prerelease == true)][0].assets[] | select(.name | contains("Linux_with_JDK") and endswith(".zip")) | .browser_download_url')
          fi
          echo "GAMA_DOWNLOAD_URL=$GAMA_DOWNLOAD_URL" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      - name: Download & unpack GAMA headless
        run: |
          curl -L "${{ env.GAMA_DOWNLOAD_URL }}" -o gama-headless.zip
          unzip -q gama-headless.zip -d gama-headless
          # Install SIMPLE's GAMA plugin
          python3 $GITHUB_WORKSPACE/test/setup/p2Downloader.py 'https://project-simple.github.io/simple.toolchain/' ./gama-headless/dropins
          # Force using dropins in headless
          rm -fr gama-headless/headless/configuration && cp -r gama-headless/configuration gama-headless/headless/configuration

      - name: Start GAMA WebSocket server
        # Adjust to match the GAMA version's server-launch command. GAMA exposes
        # a WebSocket server on GAMA_WS_PORT that GamaConnector connects to.
        run: |
          chmod +x gama-headless/**/gama-headless.sh || true
          nohup bash -c 'gama-headless/**/gama-headless.sh -socket ${{ env.GAMA_WS_PORT }}' > gama-server.log 2>&1 &
          # Wait (up to ~60s) for the server port to open.
          for i in $(seq 1 60); do
            if bash -c "echo > /dev/tcp/localhost/${{ env.GAMA_WS_PORT }}" 2>/dev/null; then
              echo "GAMA server is up"; break
            fi
            sleep 1
          done

      - name: Set custom GAMA port
        run: |
          echo "GAMA_WS_PORT=${{ env.GAMA_WS_PORT }}" >> .env

      - name: Integration tests (real GAMA)
        run: npm run test:integration

      - name: Upload GAMA server log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: gama-server-log
          path: gama-server.log
          if-no-files-found: ignore

  # Browser end-to-end: real backend (StaticServer + MonitorServer + ModelManager)
  # driven by a headless Chromium. No GAMA/hardware needed — tiles render disabled.
  test-e2e:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests (builds frontend, boots the real backend)
        run: npm run test:e2e

  # Full-stack end-to-end against the COMPILED single-executable, wired to a real
  # GAMA server AND a real Android emulator. Drives the whole flow from the browser:
  # the model list loads, the platform connects to GAMA (tiles enable), a device's
  # screen streams to a <canvas>, and an experiment is launched from the UI.
  #
  # Reuses the binary from the compilation-linux job (no rebuild) and boots GAMA the
  # same way as test-integration. Non-blocking: emulator + GAMA are the slowest,
  # flakiest parts of CI, so a failure here should not gate merges.
  test-e2e-full:
    runs-on: ubuntu-latest
    needs: compilation-linux
    env:
      GAMA_IP_ADDRESS: localhost
      GAMA_WS_PORT: "2000"
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      - name: Download the compiled Linux binary (from compilation-linux)
        uses: actions/download-artifact@v5
        with:
          name: linux-compiled-archive
          path: bin

      - name: Make the binary executable
        run: chmod +x bin/simple-linux

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve GAMA download link
        run: |
          GAMA_DOWNLOAD_URL=$(curl -s https://api.github.com/repos/gama-platform/gama/releases/latest | jq -r '.assets[] | select(.name | contains("Linux_with_JDK") and endswith(".zip")) | .browser_download_url')
          echo "GAMA_DOWNLOAD_URL=$GAMA_DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Download & unpack GAMA headless
        run: |
          curl -L "${{ env.GAMA_DOWNLOAD_URL }}" -o gama-headless.zip
          unzip -q gama-headless.zip -d gama-headless
          # Install SIMPLE's GAMA plugin
          python3 $GITHUB_WORKSPACE/test/setup/p2Downloader.py 'https://project-simple.github.io/simple.toolchain/' ./gama-headless/dropins
          # Force using dropins in headless
          rm -fr gama-headless/headless/configuration && cp -r gama-headless/configuration gama-headless/headless/configuration

      - name: Start GAMA WebSocket server
        run: |
          chmod +x gama-headless/**/gama-headless.sh || true
          nohup bash -c 'gama-headless/**/gama-headless.sh -socket ${{ env.GAMA_WS_PORT }}' > gama-server.log 2>&1 &
          for i in $(seq 1 60); do
            if bash -c "echo > /dev/tcp/localhost/${{ env.GAMA_WS_PORT }}" 2>/dev/null; then
              echo "GAMA server is up"; break
            fi
            sleep 1
          done

      # Hardware-accelerate the emulator so it boots fast enough for the job.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The emulator registers with the adb server on localhost:5037; test:e2e:full
      # boots the binary (already pointed at GAMA), which connects to both. Specs
      # self-skip if GAMA/streaming never come up, so this surfaces as skipped, not
      # a false pass.
      - name: Full-stack E2E (binary + GAMA + emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: npm run test:e2e:full

      - name: Upload GAMA server log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: gama-server-log-e2e
          path: gama-server.log
          if-no-files-found: ignore

  # macOS full-stack E2E: the compiled macOS binary + a real GAMA server, WITHOUT
  # the Android emulator (that stays Linux-only). The macOS binary is a bare node
  # SEA with no launcher — the same setup that hit the bufferutil bug — so this
  # guards the GAMA-send path on macOS. The GAMA setup mirrors test-e2e-full; the
  # GAMA steps are best-effort (macOS asset naming can differ) and non-fatal, so a
  # GAMA that never comes up makes full-stack self-skip rather than fail the job.
  test-e2e-full-macos:
    runs-on: macos-latest
    needs: compilation-macos
    env:
      GAMA_IP_ADDRESS: localhost
      GAMA_WS_PORT: "2000"
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      - name: Download the compiled macOS binary (from compilation-macos)
        uses: actions/download-artifact@v5
        with:
          name: macos-compiled-archive
          path: bin

      - name: Make the binary executable
        run: chmod +x bin/simple-macos

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      # macOS GAMA ships ONLY as a .dmg (no headless zip). macos-latest is ARM, so
      # use the M1 build with a bundled JDK.
      - name: Resolve GAMA download link (macOS, M1 .dmg with JDK)
        run: |
          GAMA_DOWNLOAD_URL=$(curl -s https://api.github.com/repos/gama-platform/gama/releases/latest | jq -r '.assets[] | select(.name | contains("MacOS_M1_with_JDK") and endswith(".dmg")) | .browser_download_url')
          echo "GAMA_DOWNLOAD_URL=$GAMA_DOWNLOAD_URL" >> $GITHUB_ENV

      # Mount the .dmg, copy GAMA.app out (the volume is read-only), install the
      # SIMPLE plugin into the app's dropins. Paths inside GAMA.app are discovered
      # with `find` since the bundle layout differs from the Linux zip.
      - name: Download, mount GAMA .dmg and install the SIMPLE plugin
        continue-on-error: true
        run: |
          curl -L "${{ env.GAMA_DOWNLOAD_URL }}" -o gama.dmg
          hdiutil attach gama.dmg -nobrowse -mountpoint /Volumes/GAMA
          cp -R /Volumes/GAMA/*.app ./GAMA.app
          hdiutil detach /Volumes/GAMA
          DROPINS=$(find ./GAMA.app -type d -name dropins | head -1)
          [ -z "$DROPINS" ] && DROPINS="./GAMA.app/Contents/Eclipse/dropins" && mkdir -p "$DROPINS"
          python3 $GITHUB_WORKSPACE/test/setup/p2Downloader.py 'https://project-simple.github.io/simple.toolchain/' "$DROPINS"

      - name: Start GAMA WebSocket server
        continue-on-error: true
        run: |
          HEADLESS=$(find ./GAMA.app -name 'gama-headless.sh' | head -1)
          chmod +x "$HEADLESS" || true
          nohup bash -c "'$HEADLESS' -socket ${{ env.GAMA_WS_PORT }}" > gama-server.log 2>&1 &
          for i in $(seq 1 120); do
            if bash -c "echo > /dev/tcp/localhost/${{ env.GAMA_WS_PORT }}" 2>/dev/null; then echo "GAMA server is up"; break; fi
            sleep 1
          done

      - name: Full-stack E2E (macOS binary + GAMA, no emulator)
        run: npm run test:e2e:full

      - name: Upload GAMA server log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: gama-server-log-e2e-macos
          path: gama-server.log
          if-no-files-found: ignore

  # Windows full-stack E2E: the compiled Windows binary + a real GAMA server, no
  # emulator (Windows runners can't nest-virtualize Android). The Windows binary
  # already sets WS_NO_BUFFER_UTIL via its launcher, so it dodged the bufferutil
  # bug — this lane confirms it stays working. GAMA on Windows uses gama-headless.bat
  # via pwsh; the exact layout/flags may need tuning, so the GAMA steps are
  # non-fatal and full-stack self-skips if GAMA never comes up.
  test-e2e-full-windows:
    runs-on: windows-latest
    needs: compilation-windows
    env:
      GAMA_IP_ADDRESS: localhost
      GAMA_WS_PORT: "2000"
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      # download-artifact flattens the single-file archive to bin/simple-win.exe,
      # which is what playwright.full.config.ts expects on win32.
      - name: Download the compiled Windows binary (from compilation-windows)
        uses: actions/download-artifact@v5
        with:
          name: windows-compiled-archive
          path: bin

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve GAMA download link (Windows)
        shell: bash
        run: |
          GAMA_DOWNLOAD_URL=$(curl -s https://api.github.com/repos/gama-platform/gama/releases/latest | jq -r '.assets[] | select(.name | contains("Windows") and contains("with_JDK") and endswith(".zip")) | .browser_download_url')
          echo "GAMA_DOWNLOAD_URL=$GAMA_DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Download & unpack GAMA headless
        continue-on-error: true
        shell: pwsh
        run: |
          curl.exe -L "$env:GAMA_DOWNLOAD_URL" -o gama-headless.zip
          Expand-Archive -Path gama-headless.zip -DestinationPath gama-headless -Force
          python "$env:GITHUB_WORKSPACE/test/setup/p2Downloader.py" 'https://project-simple.github.io/simple.toolchain/' ./gama-headless/dropins

      - name: Start GAMA WebSocket server
        continue-on-error: true
        shell: pwsh
        run: |
          $bat = Get-ChildItem -Path gama-headless -Recurse -Filter gama-headless.bat | Select-Object -First 1
          Start-Process -FilePath $bat.FullName -ArgumentList '-socket', '${{ env.GAMA_WS_PORT }}' -NoNewWindow
          for ($i = 0; $i -lt 90; $i++) {
            if (Test-NetConnection -ComputerName localhost -Port ${{ env.GAMA_WS_PORT }} -InformationLevel Quiet) { break }
            Start-Sleep -Seconds 1
          }

      - name: Full-stack E2E (Windows binary + GAMA, no emulator)
        run: npm run test:e2e:full

  # Real-device ADB tests against a hardware-accelerated Android emulator.
  # Covers the generic adb-server + shell paths (device discovery, isDeviceReady,
  # transport shell round-trip, package/version detection). Quest/Oculus-specific
  # provisioning is out of scope — no emulator equivalent exists.
  #
  # Separate, non-blocking job: emulator runs are the slowest/flakiest part of CI,
  # so a failure here should not gate merges.
  test-adb:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm ci

      # Grant the runner access to /dev/kvm so the emulator is hardware-accelerated
      # (boots in ~15s instead of minutes). Requires GitHub's KVM-enabled Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run ADB tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # The emulator boots and registers with the adb server on localhost:5037,
          # then `npm run test:adb` connects to it. The suite auto-skips if no
          # device is present, so a boot failure surfaces as skipped, not a false pass.
          script: npm run test:adb

  compilation-linux:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm i

      - name: Build Linux binary
        run: npm run build:sea:linux

      - name: Export release for Linux
        uses: actions/upload-artifact@v5
        with:
          name: linux-compiled-archive
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          path: ${{ github.workspace }}/bin/simple-linux

  compilation-macos:
    runs-on: macos-latest
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm modules
        run: npm i

      - name: Build macOS binary
        run: npm run build:sea:macos

      - name: Export release for macOS
        uses: actions/upload-artifact@v5
        with:
          name: macos-compiled-archive
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          path: ${{ github.workspace }}/bin/simple-macos

  compilation-windows:
    runs-on: windows-latest
    steps:

      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install npm modules
        run: npm i

      - name: Build Windows binary
        run: npm run build:sea:win

      - name: Export release for Windows
        uses: actions/upload-artifact@v5
        with:
          name: windows-compiled-archive
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          path: ${{ github.workspace }}/bin/win/simple-win.exe
